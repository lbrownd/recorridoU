<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBROWN Microsystems GPS</title>
    <link rel="stylesheet" href="/leaflet.css" />
    <script src="/socket.io/socket.io.js"></script>
    <script src="/leaflet.js"></script>
</head>
<body style="font-family:Arial,sans-serif;padding:15px;max-width:1000px;margin:0 auto;background:#f4f6f9;">
    <h2>Control GPS de Recorridos de la UNAN - Managua</h2>
    
    <div style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px;">
        <!-- Panel del Conductor -->
        <div style="flex:1;min-width:280px;border:1px solid #ccc;padding:15px;border-radius:8px;background:#fff;">
            <h3 style="margin-top:0;color:#2e7d32;"> 🟢 Control Conductor</h3>
            <button id="btn-viaje" onclick="solicitarPin('pausa')" style="padding:10px;background:#2e7d32;color:#fff;border:none;border-radius:4px;font-weight:bold;width:100%;cursor:pointer;">Activar GPS</button>
            <button id="btn-finalizar" onclick="solicitarPin('finalizar')" disabled style="padding:10px;background:#9ca3af;color:#fff;border:none;border-radius:4px;font-weight:bold;width:100%;margin-top:8px;cursor:not-allowed;">Finalizar Turno</button>
            
            <div id="contenedor-pin" style="margin-top:10px;padding:10px;border:2px solid #ef4444;border-radius:6px;background:#fef2f2;display:none;text-align:center;">
                <p style="margin:0 0 8px;font-size:12px;font-weight:bold;color:#991b1b;">PIN de Seguridad:</p>
                <input type="password" id="input-pin" maxlength="4" placeholder="••••" style="width:60px;padding:6px;text-align:center;border:1px solid #f87171;border-radius:4px;letter-spacing:3px;">
                <button onclick="validarPin()" style="padding:6px;background:#ef4444;color:#fff;border:none;border-radius:4px;font-weight:bold;cursor:pointer;font-size:12px;margin-left:5px;">OK</button>
                <button onclick="cancelarPin()" style="padding:6px;background:#6b7280;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;margin-left:5px;">X</button>
            </div>
            <p id="envio-status" style="margin-top:10px;font-weight:bold;font-size:13px;margin-bottom:0;">Estado: Apagado</p>
        </div>

        <!-- Panel del Pasajero / Supervisor con Auditoría -->
        <div style="flex:1;min-width:320px;border:1px solid #ccc;padding:15px;border-radius:8px;background:#fff;">
            <h3 style="margin-top:0;color:#1565c0;">🔵 Monitor de Oficina & Auditoría</h3>
            <div style="margin-bottom:12px;padding:8px;background:#f1f5f9;border-radius:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <label style="font-size:12px;font-weight:bold;color:#475569;">📅 Auditar Día:</label>
                <input type="date" id="select-fecha" style="padding:4px;border:1px solid #cbd5e1;border-radius:4px;font-size:12px;">
                <button onclick="consultarHistorialBaseDatos()" style="padding:5px 10px;background:#1565c0;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:bold;cursor:pointer;">Buscar</button>
                <button id="btn-volver-vivo" onclick="restaurarMonitoreoEnVivo()" style="padding:5px 10px;background:#10b981;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:bold;cursor:pointer;display:none;">Volver En Vivo 🔴</button>
            </div>
            <div id="coordenadas-recibidas" style="font-size:14px;color:#333;line-height:1.4;">Esperando señal...</div>
        </div>
    </div>

    <div id="mapa" style="width:100%;height:480px;border-radius:8px;border:1px solid #ccc;background:#e5e7eb;"></div>
    <script>
        let socket=null,watchId=null,map=null,marcadorVehiculo=null,lineaTrayectoria=null,marcadorSalida=null,esPrimerPunto=true,modoAuditoria=false;
        const PIN_AUTORIZADO="1234",rutaId="Ruta_Norte";
        let accionPendiente="",latIn=12.1364,lngIn=-86.2514;

        document.addEventListener("DOMContentLoaded",()=>{
            // Configurar el calendario web con la fecha de hoy por defecto
       //     document.getElementById('select-fecha').value = new Date().toISOString().split('T')[0];
            const localDate = new Date();
const yyyy = localDate.getFullYear();
const mm = String(localDate.getMonth() + 1).padStart(2, '0');
const dd = String(localDate.getDate()).padStart(2, '0');
document.getElementById('select-fecha').value = `${yyyy}-${mm}-${dd}`;


            if(typeof io!=='undefined')socket=io();
            if(typeof L!=='undefined'){
                try{
                    map=L.map('mapa').setView([latIn,lngIn],14);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    const iconoBus=L.divIcon({
                        html:'<div style="font-size:32px;line-height:1;">🚌</div>',
                        iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-15]
                    });
                    marcadorVehiculo=L.marker([latIn,lngIn],{icon:iconoBus}).addTo(map);
                    lineaTrayectoria=L.polyline([],{color:'#2563eb',weight:6,opacity:0.85,lineJoin:'round'}).addTo(map);
                }catch(e){console.error(e);}
            }
            if(socket){
                socket.on('cargar_historial_bitacora',(pts)=>{
                    if(pts.length>0&&esPrimerPunto&&!modoAuditoria){
                        esPrimerPunto=false;
                        const p0=[parseFloat(pts[0].lat),parseFloat(pts[0].lng)];
                        marcadorSalida=L.circleMarker(p0,{radius:8,fillColor:"#10b981",color:"#fff",weight:2,fillOpacity:1}).addTo(map).bindPopup("Salida de Terminal");
                        const list=pts.map(p=>[parseFloat(p.lat),parseFloat(p.lng)]);
                        lineaTrayectoria.setLatLngs(list);
                        marcadorVehiculo.setLatLng(list[list.length-1]);
                        map.setView(list[list.length-1],16);
                        document.getElementById('coordenadas-recibidas').innerHTML=`<b>Ruta en Curso:</b><br>Recuperados ${pts.length} puntos previos del viaje de hoy.`;
                    }
                });

                socket.on('limpiar_mapa_pasajeros',()=>{
                    if(modoAuditoria) return; // No interferir si el jefe está auditando el pasado
                    esPrimerPunto=true;
                    if(lineaTrayectoria)lineaTrayectoria.setLatLngs([]);
                    if(marcadorSalida){map.removeLayer(marcadorSalida);marcadorSalida=null;}
                    document.getElementById('coordenadas-recibidas').innerHTML="Esperando señal...";
                    if(map)map.setView([latIn,lngIn],14);
                });

                socket.on(`usuario_recibe_ruta_${rutaId}`,(d)=>{
                    if(modoAuditoria) return; // Si la oficina está viendo el pasado, ignora los destellos en vivo
                    const pos=[parseFloat(d.lat),parseFloat(d.lng)];
                    if(esPrimerPunto){
                        esPrimerPunto=false;
                        marcadorSalida=L.circleMarker(pos,{radius:8,fillColor:"#10b981",color:"#fff",weight:2,fillOpacity:1}).addTo(map);
                        map.setView(pos,16);
                    }
                    document.getElementById('coordenadas-recibidas').innerHTML=`<b>Ubicación Recibida (En Vivo):</b><br>Lat: ${pos[0].toFixed(5)} | Lng: ${pos[1].toFixed(5)}<br>Vel: ${d.velocidad||0} km/h<br><small>Error GPS: ±${d.precision||0}m</small>`;
                    if(map){
                        if(marcadorVehiculo)marcadorVehiculo.setLatLng(pos);
                        if(lineaTrayectoria)lineaTrayectoria.addLatLng(pos);
                        map.panTo(pos);
                    }
                });
            }
        });
        // NUEVA FUNCIÓN: Consulta el historial de la Base de Datos mediante AJAX/Fetch
        function consultarHistorialBaseDatos() {
            const fechaSeleccionada = document.getElementById('select-fecha').value;
            if(!fechaSeleccionada) return alert("Selecciona una fecha válida.");

            modoAuditoria = true;
            document.getElementById('btn-volver-vivo').style.display = 'inline-block';

            fetch(`/api/historial?ruta=${rutaId}&fecha=${fechaSeleccionada}`)
                .then(res => res.json())
                .then(data => {
                    if(data.length === 0) {
                        alert("No hay registros de rutas completadas para la fecha seleccionada.");
                        restaurarMonitoreoEnVivo();
                        return;
                    }

                    // Limpiar mapa para proyectar la bitácora histórica
                    if(lineaTrayectoria) lineaTrayectoria.setLatLngs([]);
                    if(marcadorSalida) { map.removeLayer(marcadorSalida); marcadorSalida = null; }

                    const listaHistorica = data.map(p => [parseFloat(p.lat), parseFloat(p.lng)]);
                    
                    // Pintar hito de partida histórico
                    marcadorSalida = L.circleMarker(listaHistorica[0], {radius:8, fillColor:"#eab308", color:"#fff", weight:2, fillOpacity:1}).addTo(map).bindPopup("Salida registrada ese día");
                    
                    // Trazar el camino completo de ese día
                    lineaTrayectoria.setLatLngs(listaHistorica);
                    marcadorVehiculo.setLatLng(listaHistorica[listaHistorica.length - 1]);
                    
                    // Encuentra el encuadre perfecto del mapa para ver toda la ruta recorrida de golpe
                    map.fitBounds(lineaTrayectoria.getBounds());

                    document.getElementById('coordenadas-recibidas').innerHTML = `
                        <b style="color:#1565c0;">📊 REPORTE DE AUDITORÍA HISTÓRICA</b><br>
                        <b>Fecha:</b> ${fechaSeleccionada}<br>
                        <b>Puntos rastreados:</b> ${data.length}<br>
                        <b>Último reporte hora:</b> ${data[data.length-1].hora}
                    `;
                })
                .catch(err => console.error("Error al auditar:", err));
        }

        function restaurarMonitoreoEnVivo() {
            modoAuditoria = false;
            esPrimerPunto = true;
            document.getElementById('btn-volver-vivo').style.display = 'none';
            document.getElementById('select-fecha').value = new Date().toISOString().split('T')[0];
            if(lineaTrayectoria) lineaTrayectoria.setLatLngs([]);
            if(marcadorSalida) { map.removeLayer(marcadorSalida); marcadorSalida = null; }
            if(socket) socket.emit('finalizar_viaje_limpiar_bitacora'); // Fuerza al servidor a refrescar la info en vivo actual
        }

        function enviarGps(p){
            const lat=p.coords.latitude,lng=p.coords.longitude,acc=Math.round(p.coords.accuracy);
            let vel=p.coords.speed?Math.round(p.coords.speed*3.6):0;
            if(acc>45){
                document.getElementById('envio-status').innerText="Señal débil...";
                return;
            }
            document.getElementById('envio-status').innerText="Transmitiendo EN VIVO 🛰️ ("+acc+"m)";
            if(socket)socket.emit('conductor_envia_coordenadas',{rutaId:rutaId,lat:parseFloat(lat.toFixed(6)),lng:parseFloat(lng.toFixed(6)),velocidad:vel,precision:acc});
        }
        function solicitarPin(t){
            if(watchId===null&&t==='pausa'){arrancarGps();return;}
            accionPendiente=t;
            document.getElementById('contenedor-pin').style.display='block';
            document.getElementById('input-pin').value='';
        }
        function validarPin(){
            if(document.getElementById('input-pin').value===PIN_AUTORIZADO){
                document.getElementById('contenedor-pin').style.display='none';
                if(accionPendiente==='pausa')apagarGps();
                else if(accionPendiente==='finalizar')cerrarTurno();
            }else{
                alert("PIN Incorrecto.");
                cancelarPin();
            }
        }
        function cancelarPin(){document.getElementById('contenedor-pin').style.display='none';accionPendiente="";}
        function arrancarGps(){
            const b1=document.getElementById('btn-viaje'),b2=document.getElementById('btn-finalizar');
            b1.innerText="Pausar GPS";b1.style.background="#d97706";
            b2.removeAttribute('disabled');b2.style.cursor='pointer';b2.style.background='#c62828';
            const opt={enableHighAccuracy:true,timeout:15000,maximumAge:0};
            navigator.geolocation.getCurrentPosition((p)=>{
                enviarGps(p);
                watchId=navigator.geolocation.watchPosition(enviarGps,(e)=>console.error(e),opt);
            },(e)=>apagarGps(),opt);
        }
        function apagarGps(){
            if(watchId)navigator.geolocation.clearWatch(watchId);watchId=null;
            document.getElementById('btn-viaje').innerText="Activar GPS";
            document.getElementById('btn-viaje').style.background="#2e7d32";
            document.getElementById('envio-status').innerText="Estado: Apagado";
        }
        function cerrarTurno(){
            apagarGps();
            const b2=document.getElementById('btn-finalizar');
            b2.setAttribute('disabled','true');b2.style.cursor='not-allowed';b2.style.background='#9ca3af';
            esPrimerPunto=true;
            if(lineaTrayectoria)lineaTrayectoria.setLatLngs([]);
            if(marcadorSalida){map.removeLayer(marcadorSalida);marcadorSalida=null;}
            if(socket)socket.emit('finalizar_viaje_limpiar_bitacora');
        }
    </script>
</body>
</html>
